# Batch Configuration File
# Edit this file before each dataset generation run

# Batch Metadata
batch:
  name: "Bank Fraud Scenarios - October 2025"
  description: "30 bank fraud scenarios covering phishing, OTP theft, KYC scams, and more"
  scenario_type: "bank_fraud"  # Used for organization and folder naming
  
# Entity Configuration (Flexible per batch type)
# These entities will be randomly selected and used in conversations
entities:
  organizations:
    - "HDFC Bank"
    - "State Bank of India"
    - "ICICI Bank"
    - "Axis Bank"
  
  # Additional context (optional)
  telecom_providers:
    - "Jio"
    - "Airtel"
    - "VI"
  
  payment_platforms:
    - "PayTM"
    - "PhonePe"
    - "Google Pay"
    - "BHIM UPI"

# Generation Parameters
generation:
  multiplier: 1  # Generate N variations of each combination
  
  # Performance settings
  max_workers: 50  # Number of concurrent API workers (10-100)
  rate_limit_per_minute: 500  # API rate limiting
  enable_adaptive_scaling: true  # Dynamically adjust workers based on API performance

# Recovery Settings
recovery:
  enabled: true  # Enable checkpoint and recovery system
  checkpoint_interval: 50  # Save progress every N conversations
  auto_resume: true  # Automatically resume from last checkpoint if found
  retry_failed_sessions: true  # Retry failed sessions at the end
  max_retries: 3  # Maximum retry attempts per failed session

# Output Settings
output:
  create_batch_folder: true  # Create timestamped batch folders
  save_batch_metadata: true  # Save batch configuration and statistics
  compress_old_batches: false  # Compress batches older than 30 days (future feature)

